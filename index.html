<!DOCTYPE html>
<html>
<head>
    <title>🎰 Gift Battle Roulette</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2a 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Фон с искрами */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml;utf8,<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="10" cy="20" r="1" fill="%23ffd700" opacity="0.3"/><circle cx="50" cy="80" r="1.5" fill="%23ffd700" opacity="0.4"/><circle cx="80" cy="30" r="1" fill="%23ffd700" opacity="0.3"/><circle cx="30" cy="60" r="2" fill="%23ffd700" opacity="0.2"/><circle cx="90" cy="90" r="1" fill="%23ffd700" opacity="0.3"/></svg>');
            background-size: 200px 200px;
            opacity: 0.5;
            pointer-events: none;
            z-index: -1;
        }
        
        .top-bar {
            background: rgba(15, 15, 25, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 215, 0, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
        }
        
        .settings-icon {
            width: 40px;
            height: 40px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 24px;
            color: #ffd700;
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            transition: all 0.3s;
        }
        
        .settings-icon:hover {
            transform: rotate(90deg);
            background: rgba(255, 215, 0, 0.2);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
        }
        
        .balance-container {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            border: 1px solid rgba(255, 215, 0, 0.5);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }
        
        .star-icon {
            width: 24px;
            height: 24px;
            background: url('https://cdn1.tenchat.ru/static/vbc-gostinder/2025-09-21/5c565d16-168c-49e4-8b3c-6d20da018214.webp') center/contain no-repeat;
            filter: drop-shadow(0 0 5px gold);
        }
        
        .balance-amount {
            color: #ffd700;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        
        .content {
            flex: 1;
            padding: 20px;
            padding-bottom: 80px;
            overflow-y: auto;
        }
        
        .section-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 30px;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            text-align: center;
            letter-spacing: 2px;
        }
        
        /* ГЛАВНЫЙ ЭКРАН С РУЛЕТКОЙ */
        .roulette-container {
            width: 100%;
            margin: 40px 0;
            position: relative;
        }
        
        /* Эффект свечения вокруг рулетки */
        .roulette-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 95%;
            height: 95%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.3) 0%, transparent 70%);
            filter: blur(50px);
            z-index: 0;
            pointer-events: none;
            animation: glowPulse 3s infinite;
        }
        
        @keyframes glowPulse {
            0% { opacity: 0.3; transform: translate(-50%, -50%) scale(0.95); }
            50% { opacity: 0.7; transform: translate(-50%, -50%) scale(1.05); }
            100% { opacity: 0.3; transform: translate(-50%, -50%) scale(0.95); }
        }
        
        .roulette-track {
            display: flex;
            flex-direction: row;
            gap: 15px;
            overflow-x: auto;
            scroll-behavior: auto;
            padding: 20px 0;
            position: relative;
            z-index: 1;
            cursor: grab;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        
        .roulette-track::-webkit-scrollbar {
            display: none;
        }
        
        .roulette-track.dragging {
            cursor: grabbing;
            scroll-behavior: auto;
        }
        
        .roulette-item {
            min-width: 160px;
            width: 160px;
            height: 180px;
            background: linear-gradient(180deg, rgba(40, 30, 60, 0.9) 0%, rgba(20, 15, 30, 0.95) 100%);
            border-radius: 40px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.8), 0 0 30px rgba(255, 215, 0, 0.2);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }
        
        /* Неоновая обводка для активного элемента */
        .roulette-item.active {
            border-color: #ffd700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.6), 0 0 60px rgba(255, 215, 0, 0.3);
            transform: scale(1.05);
        }
        
        /* Пульсирующая обводка для активного элемента */
        .roulette-item.active::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 42px;
            border: 2px solid transparent;
            background: linear-gradient(135deg, #ffd700, #aa00ff) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out;
            mask-composite: exclude;
            animation: borderPulse 2s infinite;
        }
        
        @keyframes borderPulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
        
        .roulette-item img {
            width: 90px;
            height: 90px;
            object-fit: contain;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.5));
        }
        
        .roulette-item .item-name {
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 5px;
            text-align: center;
        }
        
        .roulette-item .item-price {
            color: #ffd700;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 0 10px gold;
        }
        
        .roulette-item::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 30%;
            background: linear-gradient(180deg, transparent 0%, rgba(0, 0, 0, 0.5) 100%);
            pointer-events: none;
            border-radius: 0 0 40px 40px;
        }
        
        /* Индикатор выигрыша */
        .win-indicator {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 4px;
            background: linear-gradient(180deg, transparent, #ffd700, #aa00ff, #ffd700, transparent);
            transform: translateX(-50%);
            z-index: 10;
            box-shadow: 0 0 30px gold, 0 0 50px #aa00ff;
            animation: indicatorPulse 1.5s infinite;
            pointer-events: none;
        }
        
        @keyframes indicatorPulse {
            0% { opacity: 0.7; width: 4px; }
            50% { opacity: 1; width: 6px; box-shadow: 0 0 40px gold, 0 0 60px #aa00ff; }
            100% { opacity: 0.7; width: 4px; }
        }
        
        /* КНОПКА КРУТИТЬ */
        .spin-button {
            width: 200px;
            height: 60px;
            margin: 30px auto;
            background: linear-gradient(145deg, #ffd700, #aa00ff);
            border: none;
            border-radius: 40px;
            color: #000;
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 40px rgba(255, 215, 0, 0.5);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }
        
        /* Неоновая обводка вокруг кнопки */
        .spin-button::before {
            content: '';
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            border-radius: 43px;
            border: 2px solid transparent;
            background: linear-gradient(135deg, #ffd700, #aa00ff, #ffd700) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out;
            mask-composite: exclude;
            animation: borderRotate 3s linear infinite;
        }
        
        @keyframes borderRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .spin-button:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6), 0 0 60px rgba(255, 215, 0, 0.7);
        }
        
        .spin-button:active {
            transform: scale(0.95);
        }
        
        .spin-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        /* РЕЗУЛЬТАТ */
        .result-container {
            text-align: center;
            margin: 20px 0;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        
        .result-title {
            font-size: 18px;
            color: #aaa;
            margin-bottom: 10px;
        }
        
        .result-item-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        
        .result-item-display img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            filter: drop-shadow(0 0 20px gold);
        }
        
        .result-item-display .item-name {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 5px;
        }
        
        .result-item-display .item-price {
            font-size: 28px;
            color: #ffd700;
            font-weight: bold;
            text-shadow: 0 0 15px gold;
        }
        
        /* МОДАЛЬНОЕ ОКНО НАСТРОЕК */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            justify-content: center;
            align-items: flex-end;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: linear-gradient(145deg, #1a0a2a, #0f0f1f);
            border-radius: 40px 40px 0 0;
            padding: 30px 20px;
            width: 100%;
            max-width: 600px;
            border-top: 2px solid rgba(255, 215, 0, 0.5);
            box-shadow: 0 -20px 60px rgba(0, 0, 0, 0.9), 0 0 80px rgba(170, 0, 255, 0.3);
            max-height: 80vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-header h2 {
            color: #ffd700;
            font-size: 24px;
            text-shadow: 0 0 20px gold;
        }
        
        .close-modal {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 24px;
            color: #fff;
            border: 1px solid rgba(255, 215, 0, 0.3);
            transition: all 0.3s;
        }
        
        .close-modal:hover {
            background: rgba(255, 215, 0, 0.2);
            color: #ffd700;
        }
        
        .settings-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .setting-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 15px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }
        
        .setting-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }
        
        .setting-header img {
            width: 50px;
            height: 50px;
            object-fit: contain;
        }
        
        .setting-header .item-name {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
        }
        
        .setting-control {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .setting-control label {
            color: #aaa;
            font-size: 14px;
            flex: 1;
        }
        
        .setting-control input {
            width: 80px;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 15px;
            color: #ffd700;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
        }
        
        .setting-control input:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 20px gold;
        }
        
        .setting-control span {
            color: #ffd700;
            font-weight: bold;
        }
        
        .save-settings {
            width: 100%;
            padding: 16px;
            background: linear-gradient(145deg, #ffd700, #aa00ff);
            border: none;
            border-radius: 30px;
            color: #000;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5), 0 0 30px rgba(255, 215, 0, 0.5);
            transition: all 0.3s;
        }
        
        .save-settings:hover {
            transform: scale(1.02);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.6), 0 0 40px rgba(255, 215, 0, 0.7);
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15, 15, 25, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid rgba(255, 215, 0, 0.3);
            z-index: 99;
            box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.5);
        }
        
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            padding: 10px;
            cursor: pointer;
            color: #666;
            transition: all 0.3s;
        }
        
        .nav-item.active {
            color: #ffd700;
            text-shadow: 0 0 20px gold;
            transform: translateY(-5px);
        }
        
        .nav-icon {
            font-size: 24px;
        }
        
        .nav-label {
            font-size: 12px;
            font-weight: 500;
        }
        
        .section {
            display: none;
        }
        
        .section.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="settings-icon" onclick="openSettings()">⚙️</div>
        <div class="balance-container" onclick="showBalanceInfo()">
            <div class="star-icon"></div>
            <span class="balance-amount" id="balanceDisplay">1000</span>
        </div>
    </div>

    <div class="content">
        <!-- Главный экран с рулеткой -->
        <div id="mainSection" class="section active">
            <h2 class="section-title">🎰 GIFT BATTLE ROULETTE</h2>
            
            <div class="roulette-container">
                <div class="roulette-glow"></div>
                <div class="win-indicator"></div>
                <div class="roulette-track" id="rouletteTrack"></div>
            </div>
            
            <button class="spin-button" id="spinButton" onclick="spinRoulette()">
                <span>🎲</span> КРУТИТЬ <span>🎲</span>
            </button>
            
            <div class="result-container" id="resultContainer" style="display: none;">
                <div class="result-title">🎉 ТЫ ВЫИГРАЛ 🎉</div>
                <div class="result-item-display" id="resultDisplay"></div>
            </div>
        </div>

        <!-- Профиль -->
        <div id="profileSection" class="section">
            <h2 class="section-title">👤 ПРОФИЛЬ</h2>
            <div class="result-container">
                <p style="text-align: center; color: #aaa;">Здесь будет твоя статистика</p>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchToSection('main')">
            <span class="nav-icon">🎰</span>
            <span class="nav-label">ИГРА</span>
        </div>
        <div class="nav-item" onclick="switchToSection('profile')">
            <span class="nav-icon">👤</span>
            <span class="nav-label">ПРОФИЛЬ</span>
        </div>
    </div>

    <!-- Модальное окно настроек -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>⚙️ НАСТРОЙКИ ШАНСОВ</h2>
                <div class="close-modal" onclick="closeSettings()">✕</div>
            </div>
            
            <div class="settings-list" id="settingsList"></div>
            
            <button class="save-settings" onclick="saveSettings()">СОХРАНИТЬ</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Данные призов в JSON формате
        const prizeData = {
            items: [
                { id: 'rose', name: 'Розочка', image: 'https://cdn140.picsart.com/241734929003212.png', price: 25, chance: 30 },
                { id: 'cake', name: 'Тортик', image: 'https://files.catbox.moe/1w9dkc.png', price: 50, chance: 25 },
                { id: 'diamond', name: 'Алмазик', image: 'https://files.catbox.moe/nt7ios.png', price: 100, chance: 15 },
                { id: 'ring', name: 'Кольцо', image: 'https://files.catbox.moe/8mhtc7.png', price: 100, chance: 10 },
                { id: 'xmas', name: 'Xmas Stocking', image: 'https://files.catbox.moe/yecky8.png', price: 495, chance: 8 },
                { id: 'cigar', name: 'Vintage Cigar', image: 'https://files.catbox.moe/6ified.png', price: 3357, chance: 7 },
                { id: 'charm', name: 'Cupid Charm', image: 'https://files.catbox.moe/qel225.png', price: 2038, chance: 5 }
            ]
        };

        let state = {
            balance: 1000,
            items: [...prizeData.items]
        };

        let isSpinning = false;
        let dragStart = null;
        let scrollStart = null;

        function loadState() {
            const saved = localStorage.getItem('rouletteState');
            if (saved) {
                const parsed = JSON.parse(saved);
                state.balance = parsed.balance || 1000;
                state.items = parsed.items || prizeData.items;
            }
        }
        loadState();

        function saveState() {
            localStorage.setItem('rouletteState', JSON.stringify(state));
        }

        function updateBalance() {
            document.getElementById('balanceDisplay').textContent = state.balance;
        }

        // Отрисовка рулетки
        function renderRoulette() {
            const track = document.getElementById('rouletteTrack');
            track.innerHTML = '';
            
            // Создаём много копий для бесконечной прокрутки
            for (let i = 0; i < 5; i++) {
                state.items.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'roulette-item';
                    div.dataset.id = item.id;
                    div.dataset.price = item.price;
                    div.innerHTML = `
                        <img src="${item.image}">
                        <div class="item-name">${item.name}</div>
                        <div class="item-price">${item.price} ⭐</div>
                    `;
                    track.appendChild(div);
                });
            }
            
            // Добавляем обработчики для drag-to-scroll
            setupDragScroll();
        }

        // Drag-to-scroll функциональность
        function setupDragScroll() {
            const track = document.getElementById('rouletteTrack');
            
            track.addEventListener('mousedown', (e) => {
                dragStart = e.clientX;
                scrollStart = track.scrollLeft;
                track.classList.add('dragging');
            });
            
            track.addEventListener('mousemove', (e) => {
                if (dragStart === null) return;
                e.preventDefault();
                const dx = e.clientX - dragStart;
                track.scrollLeft = scrollStart - dx;
            });
            
            track.addEventListener('mouseup', () => {
                dragStart = null;
                track.classList.remove('dragging');
            });
            
            track.addEventListener('mouseleave', () => {
                dragStart = null;
                track.classList.remove('dragging');
            });
            
            // Для touch-устройств
            track.addEventListener('touchstart', (e) => {
                dragStart = e.touches[0].clientX;
                scrollStart = track.scrollLeft;
            });
            
            track.addEventListener('touchmove', (e) => {
                if (dragStart === null) return;
                e.preventDefault();
                const dx = e.touches[0].clientX - dragStart;
                track.scrollLeft = scrollStart - dx;
            });
            
            track.addEventListener('touchend', () => {
                dragStart = null;
            });
        }

        // Функция вращения рулетки
        function spinRoulette() {
            if (isSpinning) return;
            
            const button = document.getElementById('spinButton');
            button.disabled = true;
            isSpinning = true;
            
            // Скрываем предыдущий результат
            document.getElementById('resultContainer').style.display = 'none';
            
            // Убираем активный класс со всех элементов
            document.querySelectorAll('.roulette-item').forEach(el => {
                el.classList.remove('active');
            });
            
            const track = document.getElementById('rouletteTrack');
            const itemWidth = 175; // ширина элемента + gap
            
            // Выбираем случайный приз с учётом шансов
            const random = Math.random() * 100;
            let cumulative = 0;
            let selectedItem = state.items[0];
            
            for (const item of state.items) {
                cumulative += item.chance;
                if (random <= cumulative) {
                    selectedItem = item;
                    break;
                }
            }
            
            // Находим позицию выбранного приза в треке
            const items = Array.from(track.children);
            const targetIndex = items.findIndex(el => el.dataset.id === selectedItem.id);
            
            // Рассчитываем позицию прокрутки, чтобы выбранный приз оказался по центру
            const trackWidth = track.clientWidth;
            const targetPosition = (targetIndex * itemWidth) - (trackWidth / 2) + (itemWidth / 2);
            
            // Плавная прокрутка с замедлением
            track.style.scrollBehavior = 'smooth';
            track.scrollTo({
                left: targetPosition,
                behavior: 'smooth'
            });
            
            // После остановки показываем результат
            setTimeout(() => {
                // Подсвечиваем выигрышный элемент
                items[targetIndex].classList.add('active');
                
                // Показываем результат
                const resultDiv = document.getElementById('resultDisplay');
                resultDiv.innerHTML = `
                    <img src="${selectedItem.image}">
                    <div>
                        <div class="item-name">${selectedItem.name}</div>
                        <div class="item-price">${selectedItem.price} ⭐</div>
                    </div>
                `;
                document.getElementById('resultContainer').style.display = 'block';
                
                // Списываем баланс (для демо)
                state.balance -= 50;
                if (state.balance < 0) state.balance = 0;
                updateBalance();
                saveState();
                
                button.disabled = false;
                isSpinning = false;
                
                // Возвращаем обычный scroll behavior
                setTimeout(() => {
                    track.style.scrollBehavior = 'auto';
                }, 100);
            }, 1000);
        }

        // Настройки
        function openSettings() {
            renderSettings();
            document.getElementById('settingsModal').classList.add('active');
        }

        function closeSettings() {
            document.getElementById('settingsModal').classList.remove('active');
        }

        function renderSettings() {
            const list = document.getElementById('settingsList');
            list.innerHTML = '';
            
            state.items.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'setting-item';
                div.innerHTML = `
                    <div class="setting-header">
                        <img src="${item.image}">
                        <span class="item-name">${item.name}</span>
                    </div>
                    <div class="setting-control">
                        <label>Шанс выпадения:</label>
                        <input type="number" id="chance-${index}" value="${item.chance}" min="0" max="100" step="0.1">
                        <span>%</span>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function saveSettings() {
            let total = 0;
            const newItems = [];
            
            // Собираем новые значения
            state.items.forEach((item, index) => {
                const input = document.getElementById(`chance-${index}`);
                const chance = parseFloat(input.value) || 0;
                newItems.push({ ...item, chance });
                total += chance;
            });
            
            // Проверяем сумму шансов
            if (Math.abs(total - 100) > 0.1) {
                alert(`Сумма шансов должна быть 100%. Сейчас: ${total.toFixed(1)}%`);
                return;
            }
            
            state.items = newItems;
            saveState();
            renderRoulette(); // Перерисовываем рулетку с новыми данными
            closeSettings();
        }

        // Навигация
        function switchToSection(section) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            
            if (section === 'main') {
                document.querySelectorAll('.nav-item')[0].classList.add('active');
                document.getElementById('mainSection').classList.add('active');
            } else if (section === 'profile') {
                document.querySelectorAll('.nav-item')[1].classList.add('active');
                document.getElementById('profileSection').classList.add('active');
            }
        }

        function showBalanceInfo() {
            tg.showPopup({
                title: 'Баланс',
                message: `У тебя ${state.balance} ⭐`,
                buttons: [{ type: 'close' }]
            });
        }

        // Инициализация
        renderRoulette();
        updateBalance();
    </script>
</body>
</html>
